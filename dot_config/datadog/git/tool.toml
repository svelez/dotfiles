# Set by setup — don't edit by hand.
setup-version = "2.0.0"

# git-config-tool configuration
#
# This file drives the rendering of ~/.config/datadog/git/config.
# Edit this file and re-run `git-config-tool setup` to apply changes.
#
# Top-level identity overrides (optional):
#   name   Override the discovered display name for commits.
#   email  Override the discovered @datadoghq.com email for commits.
#
# Top-level feature toggles (optional; written by setup on first run):
#   use-1password-agent   Manage SSH keys via the 1Password agent.
#                         Set false to skip 1Password setup and manage
#                         your own agent and keys.
#   manage-signing        Configure SSH-based commit signing.
#                         Set false to skip signing setup entirely.
#
# [orgs.ddoghq]
#   extra-orgs   Additional GitHub orgs that should route through the
#                ddoghq identity (ssh_config alias + URL rewrites).
#
# [ssh]
#   control-master   Enable ControlMaster in ssh_config (default: true).

use-1password-agent = true
manage-signing = true

[ssh]
control-master = true

[orgs.ddoghq]
extra-orgs = ["ddoghq-sandbox"]
